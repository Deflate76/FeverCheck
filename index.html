
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyDose | 어린이 해열제 용량 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">💊 우리 아이 해열제 계산기</h1>
            <p class="text-blue-100 text-sm mt-1">약사님이 권장하는 안전한 용량을 확인하세요</p>
        </div>

        <div class="p-6 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">아이 몸무게 (kg)</label>
                <input type="number" id="weight" placeholder="0.0" step="0.1"
                    class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-xl font-bold focus:border-blue-500 focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">해열제 성분 선택</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectDrug('acetaminophen')" id="btn-ace" 
                        class="p-3 border-2 rounded-2xl font-semibold transition-all border-slate-200 text-slate-500 hover:bg-slate-50">아세트아미노펜</button>
                    <button onclick="selectDrug('ibuprofen')" id="btn-ibu" 
                        class="p-3 border-2 rounded-2xl font-semibold transition-all border-slate-200 text-slate-500 hover:bg-slate-50">이부프로펜</button>
                </div>
            </div>

            <div id="form-section" class="hidden">
                <label class="block text-sm font-semibold text-slate-700 mb-2">제형 및 함량 선택</label>
                <select id="drug-form" onchange="calculate()"
                    class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none appearance-none">
                    </select>
            </div>

            <div id="result-card" class="hidden animate-in fade-in zoom-in duration-300">
                <div class="bg-blue-50 border border-blue-200 rounded-2xl p-6 text-center">
                    <p class="text-blue-800 font-medium mb-2">1회 권장 복용량</p>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="result-value" class="text-5xl font-black text-blue-600">0.0</span>
                        <span id="result-unit" class="text-2xl font-bold text-blue-600">ml</span>
                    </div>
                    <p id="dosage-info" class="mt-4 text-sm text-slate-500 leading-relaxed"></p>
                </div>
            </div>
        </div>

        <div class="p-6 bg-slate-100 border-t border-slate-200 text-[11px] text-slate-400">
            <p>※ 본 계산 결과는 일반적인 권장량을 기준으로 하며, 실제 복용 전 반드시 의사나 약사와 상의하십시오.</p>
        </div>
    </div>

    <script>
        const drugData = {
            acetaminophen: {
                name: "아세트아미노펜 (타이레놀 등)",
                mgPerKg: 12.5, // 10~15mg의 중간값
                interval: "4~6시간",
                maxDaily: "5회",
                forms: [
                    { label: "현탁액 (32mg/1ml)", mg: 32, unit: 1, type: "ml" },
                    { label: "정제 (80mg/1정)", mg: 80, unit: 1, type: "정" },
                    { label: "정제 (160mg/1정)", mg: 160, unit: 1, type: "정" },
                    { label: "정제 (500mg/1정)", mg: 500, unit: 1, type: "정" }
                ]
            },
            ibuprofen: {
                name: "이부프로펜 (부르펜 등)",
                mgPerKg: 7.5, // 5~10mg의 중간값
                interval: "6~8시간",
                maxDaily: "3~4회",
                forms: [
                    { label: "시럽 (20mg/1ml)", mg: 20, unit: 1, type: "ml" },
                    { label: "연질캡슐 (200mg/캡슐)", mg: 200, unit: 1, type: "캡슐" },
                    { label: "정제 (400mg/1정)", mg: 400, unit: 1, type: "정" }
                ]
            }
        };

        let selectedDrugKey = null;

        function selectDrug(key) {
            selectedDrugKey = key;
            
            // 버튼 스타일 업데이트
            document.getElementById('btn-ace').className = key === 'acetaminophen' ? 'p-3 border-2 rounded-2xl font-semibold transition-all border-blue-500 bg-blue-50 text-blue-600' : 'p-3 border-2 rounded-2xl font-semibold transition-all border-slate-200 text-slate-500';
            document.getElementById('btn-ibu').className = key === 'ibuprofen' ? 'p-3 border-2 rounded-2xl font-semibold transition-all border-blue-500 bg-blue-50 text-blue-600' : 'p-3 border-2 rounded-2xl font-semibold transition-all border-slate-200 text-slate-500';

            // 제형 옵션 로드
            const formSelect = document.getElementById('drug-form');
            formSelect.innerHTML = drugData[key].forms.map((f, i) => `<option value="${i}">${f.label}</option>`).join('');
            
            document.getElementById('form-section').classList.remove('hidden');
            calculate();
        }

        function calculate() {
            const weight = parseFloat(document.getElementById('weight').value);
            if (!weight || !selectedDrugKey) return;

            const drug = drugData[selectedDrugKey];
            const formIndex = document.getElementById('drug-form').value;
            const selectedForm = drug.forms[formIndex];

            // 계산: (몸무게 * mg/kg) / 함량
            const totalMgNeeded = weight * drug.mgPerKg;
            const dose = (totalMgNeeded / selectedForm.mg) * selectedForm.unit;

            // 결과 표시
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('result-value').innerText = dose.toFixed(1);
            document.getElementById('result-unit').innerText = selectedForm.type;
            
            document.getElementById('dosage-info').innerHTML = `
                <b>${drug.name}</b> 기준<br>
                복용 간격: <b>${drug.interval}</b> | 1일 최대 <b>${drug.maxDaily}</b>
            `;
        }

        // 입력 시 실시간 계산
        document.getElementById('weight').addEventListener('input', calculate);
    </script>
</body>
</html>
